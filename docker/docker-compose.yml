version: '3.8'
services:
  backend:
    build: ../backend
    container_name: movie-backend
    ports:
      - "8001:8000"
    volumes:
      - ../backend:/app
    restart: unless-stopped
  frontend:
    build: ../frontend
    container_name: movie-frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ../frontend:/app
    restart: unless-stopped
